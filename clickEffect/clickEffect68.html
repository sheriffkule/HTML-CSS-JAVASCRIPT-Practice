<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friendship Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="stylesheet" href="/clickEffect_style/clickEffect68.css" />
  </head>
  <body>
    <div class="container">
      <h1><i class="fa-solid fa-heart"></i> Friendship Calculator <i class="fa-solid fa-heart"></i></h1>
      <input type="text" id="name1" placeholder="Enter First Name" />
      <br />
      <input type="text" id="name2" placeholder="Enter Second Name" />
      <br />
      <div class="btn-container">
        <button onclick="calculateFriendship()" class="glow-btn">Calculate</button>
      </div>
      <div class="result" id="result"></div>
      <div class="progress-container">
        <div class="progress-bar" id="progress"></div>
      </div>
    </div>
    <script src="/clickEffect_script/clickEffect68.js"></script>
  </body>
</html>
