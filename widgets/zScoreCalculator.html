<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Z-Score Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="stylesheet" href="/widgets_style/zScoreCalculator.css" />
  </head>
  <body>
    <button class="dark-mode-toggle" id="darkModeToggle">
      <i class="fas fa-moon"></i>
    </button>

    <div class="container">
      <header>
        <h1>Z-Score Calculator</h1>
        <p class="subtitle">Calculate standard scores, probabilities, and interpret results.</p>
      </header>

      <div class="card">
        <div class="tabs">
          <div class="tab active" data-tab="zscore">Z-Score</div>
          <div class="tab" data-tab="probability">Probability</div>
          <div class="tab" data-tab="percentile">Percentile</div>
        </div>

        <div class="tab-content active" id="zscore">
          <h2 class="card-title"><i class="fas fa-calculator"></i> Calculate Z-Score</h2>
          <div class="form-group">
            <label for="rawScore">Raw Score (X)</label>
            <input type="number" id="rawScore" placeholder="Enter your data value" />
          </div>
          <div class="form-group">
            <label for="mean">Mean (μ)</label>
            <input type="number" id="mean" placeholder="Enter the mean of the distribution" />
          </div>
          <div class="form-group">
            <label for="stdDev">Standard Deviation (σ)</label>
            <input type="number" id="stdDev" placeholder="Enter the standard deviation" min="0.0001" />
          </div>
          <button class="btn btn-block" id="calculateZScore">Calculate Z-Score</button>

          <div class="result-container" id="zscoreResult">
            <div class="result-title">Z-Score Result</div>
            <div class="result-value" id="zscoreValue"></div>
            <div class="interpretation" id="zscoreInterpretation"></div>
          </div>
        </div>

        <div class="tab-content" id="probability">
          <h2 class="card-title"><i class="fas fa-chart-bar"></i> Probability from Z-Score</h2>
          <div class="form-group">
            <label for="zScoreProb">Z-Score</label>
            <input type="number" id="zScoreProb" placeholder="Enter Z-Score" />
          </div>
          <div class="form-group">
            <label for="probabilityType">Probability Type</label>
            <select id="probabilityType">
              <option value="less">Less than (P(Z < z))</option>
              <option value="greater">Greater than (P(Z > z))</option>
              <option value="between">Between two Z-scores</option>
            </select>
          </div>
          <div class="form-group" id="secondZScoreGroup">
            <label for="zScoreProb2">Second Z-Score</label>
            <input type="number" id="zScoreProb2" placeholder="Enter Z-score" />
          </div>
          <button class="btn btn-block" id="calculateProbability">Calculate Probability</button>

          <div class="result-container" id="probabilityResult">
            <div class="result-title">Probability Result</div>
            <div class="result-value" id="probabilityValue"></div>
            <div class="probability-meter">
              <div class="probability-fill" id="probabilityFill"></div>
            </div>
            <div class="probability-labels">
              <span>0%</span>
              <span>50%</span>
              <span>100%</span>
            </div>
            <div class="interpretation" id="probabilityInterpretation"></div>
          </div>
        </div>

        <div class="tab-content" id="percentile">
          <h2 class="card-title"><i class="fas fa-percentage"></i> Percentile from Z-Score</h2>
          <div class="form-group">
            <label for="zScorePercentile">Z-Score</label>
            <input type="number" id="zScorePercentile" placeholder="Enter Z-Score" />
          </div>
          <button class="btn btn-block" id="calculatePercentile">Calculate Percentile</button>

          <div class="result-container" id="percentileResult">
            <div class="result-title">Percentile Result</div>
            <div class="result-value" id="percentileValue"></div>
            <div class="interpretation" id="percentileInterpretation"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="/widgets_script/zScoreCalculator.js"></script>
  </body>
</html>
