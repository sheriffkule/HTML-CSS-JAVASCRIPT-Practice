<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Z-Score Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="stylesheet" href="/widgets_style/zScoreCalculator.css" />
  </head>
  <body>
    <button class="dark-mode-toggle" id="darkModeToggle">
      <i class="fas fa-moon"></i>
    </button>

    <div class="container">
      <header>
        <h1>Z-Score Calculator</h1>
        <p class="subtitle">Calculate standard scores, probabilities, and interpret results.</p>
      </header>

      <div class="card">
        <div class="tabs">
          <div class="tab active" data-tab="zscore">Z-Score</div>
          <div class="tab" data-tab="probability">Probability</div>
          <div class="tab" data-tab="percentile">Percentile</div>
        </div>

        <div class="tab-content active" id="zscore">
          <h2 class="card-title"><i class="fas fa-calculator"></i> Calculate Z-Score</h2>
          <div class="form-group">
            <label for="rawScore">Raw Score (X)</label>
            <input type="number" id="rawScore" placeholder="Enter your data value" />
          </div>
          <div class="form-group">
            <label for="mean">Mean (μ)</label>
            <input type="number" id="mean" placeholder="Enter the mean of the distribution" />
          </div>
          <div class="form-group">
            <label for="stdDev">Standard Deviation (σ)</label>
            <input type="number" id="stdDev" placeholder="Enter the standard deviation" min="0.0001" />
          </div>
          <button class="btn btn-block" id="calculateZScore">Calculate Z-Score</button>

          <div class="result-container" id="zscoreResult">
            <div class="result-title">Z-Score Result</div>
            <div class="result-value" id="zscoreValue"></div>
            <div class="interpretation" id="zscoreInterpretation"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
