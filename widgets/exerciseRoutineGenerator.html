<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise Routine Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="stylesheet" href="/widgets_style/exerciseRoutineGenerator.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1><i class="fas fa-dumbbell"></i> Exercise Routine Generator</h1>
        <p>Create your personalized workout routine based on your goals, available equipment, and time.</p>
      </header>

      <div class="app-container">
        <div class="form-section">
          <h2 class="section-title"><i class="fas fa-cogs"></i> Customize Your Workout</h2>

          <div class="form-group">
            <label for="goal">Fitness Goal</label>
            <select id="goal">
              <option value="strength">Strength Building</option>
              <option value="weightless">Weight Loss</option>
              <option value="endurance">Endurance</option>
              <option value="general">General Fitness</option>
            </select>
          </div>

          <div class="form-group">
            <label for="level">Fitness Level</label>
            <select id="level">
              <option value="beginner">Beginner</option>
              <option value="intermediate">Intermediate</option>
              <option value="advance">Advance</option>
            </select>
          </div>

          <div class="form-group">
            <label for="time">Available Time (minutes)</label>
            <input type="number" id="time" min="10" max="120" value="30" />
          </div>

          <div class="form-group">
            <label>Available Equipment</label>
            <div class="checkbox-group">
              <label class="checkbox-label">
                <input type="checkbox" name="equipment" value="dumbbells" checked /> Dumbbells
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="equipment" value="resistance_bands" /> Resistance Bands
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="equipment" value="yoga_mat" /> Yoga Mat
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="equipment" value="pull_up_bar" /> Pull-up Bar
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="equipment" value="none" /> None
              </label>
            </div>
          </div>

          <button id="generate-btn"><i class="fas fa-bolt"></i> Generate Routine</button>

          <div class="action-buttons">
            <button class="secondary-btn"><i class="fas fa-download"></i> Save Routine</button>
            <button class="secondary-btn"><i class="fas fa-share-alt"></i> Share</button>
          </div>
        </div>

        <div class="result-section">
          <h2 class="section-title"><i class="fas fa-list-alt"></i> Your Exercise Routine</h2>

          <div class="workout-summary">
            <div class="summary-item">
              <div class="summary-value" id="total-exercises">0</div>
              <div class="summary-label">Exercises</div>
            </div>
            <div class="summary-item">
              <div class="summary-value" id="total-time">0</div>
              <div class="summary-label">Minutes</div>
            </div>
            <div class="summary-item">
              <div class="summary-value" id="total-calories">0</div>
              <div class="summary-label">Calories</div>
            </div>
          </div>

          <div class="routine-display" id="routine-container">
            <div class="empty-state">
              <i class="fas fa-clipboard-list"></i>
              <p>Your generated routine will appear here.</p>
            </div>
          </div>
        </div>
      </div>

      <footer>
        © <time datetime="2026" id="year">2026</time> Made width <span>♥</span> by
        <em><abbr title="Web Developer Frontend Master">SheriffKule</abbr></em> from XXIII century
      </footer>
    </div>
  </body>
</html>
