<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workout Timer App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="stylesheet" href="/widgets_style/workoutTimer.css" />
  </head>
  <body data-theme="dark">
    <div class="app-container">
      <header class="app-header">
        <h1>Workout Timer App</h1>
        <div class="theme-toggle">
          <i class="fas fa-sun"></i>
          <label class="switch">
            <input type="checkbox" id="theme-switch" />
            <span class="slider round"></span>
          </label>
          <i class="fas fa-moon"></i>
        </div>
      </header>

      <main class="main-content">
        <section class="timer-display">
          <div class="time" id="time">00:00</div>
          <div class="timer-progress">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
          <div class="timer-mode" id="timer-mode">Ready</div>
          <div class="rounds-display" id="rounds-display"></div>
        </section>

        <section class="controls">
          <button class="btn primary-btn" id="start-btn"><i class="fas fa-play"></i> Start</button>
          <button class="btn secondary-btn" id="pause-btn" disabled>
            <i class="fas fa-pause"></i> Pause
          </button>
          <button class="btn danger-btn" id="reset-btn"><i class="fas fa-redo"></i> Reset</button>
        </section>

        <section class="timer-presets">
          <h3>Quick Presets</h3>
          <div class="preset-buttons">
            <button class="preset-btn" data-preset="tabata">Tabata</button>
            <button class="preset-btn" data-preset="hiit">HIIT</button>
            <button class="preset-btn" data-preset="amrap">AMRAP</button>
            <button class="preset-btn" data-preset="emom">EMOM</button>
          </div>
        </section>

        <section class="timer-config">
          <article class="config-tabs">
            <button class="tab-btn active" data-tab="interval">Interval</button>
            <button class="tab-btn" data-tab="tabata">Tabata</button>
            <button class="tab-btn" data-tab="stopwatch">Stopwatch</button>
            <button class="tab-btn" data-tab="countdown">Countdown</button>
          </article>

          <article class="tab-content active" id="interval-tab">
            <div class="form-group">
              <label for="work-time">Work Time (seconds)</label>
              <input type="number" id="work-time" min="1" value="30" />
            </div>
            <div class="form-group">
              <label for="reset-time">Reset Time (seconds)</label>
              <input type="number" id="reset-time" min="1" value="10" />
            </div>
            <div class="form-group">
              <label for="rounds">Rounds</label>
              <input type="number" id="rounds" min="1" value="5" />
            </div>
          </article>

          <article class="tab-content" id="tabata-tab">
            <div class="form-group">
              <label for="tabata-time">Work Time (seconds)</label>
              <input type="number" id="tabata-time" min="1" value="20" />
            </div>
            <div class="form-group">
              <label for="tabata-time">Reset Time (seconds)</label>
              <input type="number" id="tabata-time" min="1" value="10" />
            </div>
            <div class="form-group">
              <label for="rounds">Rounds</label>
              <input type="number" id="rounds" min="1" value="5" />
            </div>
          </article>

          <article class="tab-content" id="stopwatch-tab">
            <p>Simple stopwatch with lap time functionality.</p>
            <button class="btn secondary-btn" id="lap-btn" disabled><i class="fas fa-flag"></i> Lap</button>
            <div class="lap-times" id="lap-times"></div>
          </article>

          <article class="tab-content" id="countdown-tab">
            <div class="form-group">
              <label for="countdown-minutes">Minutes</label>
              <input type="number" id="countdown-minutes" min="0" value="5" />
            </div>
            <div class="form-group">
              <label for="countdown-seconds">Seconds</label>
              <input type="number" id="countdown-seconds" min="0" max="59" value="0" />
            </div>
          </article>
        </section>

        <section class="settings">
          <h3>Settings</h3>
          <div class="form-group">
            <label for="sound-toggle">Enable Sound</label>
            <label class="switch">
              <input type="checkbox" id="sound-toggle" checked />
              <span class="slider round"></span>
            </label>
          </div>
          <div class="form-group">
            <label for="vibration-toggle">Enable Vibration</label>
            <label class="switch">
              <input type="checkbox" id="vibration-toggle" checked />
              <span class="slider round"></span>
            </label>
          </div>
          <div class="form-group">
            <label for="end-sound">End Sound</label>
            <select id="end-sound">
              <option value="bell">Bell</option>
              <option value="beep">Beep</option>
              <option value="horn">Horn</option>
              <option value="chime">Chime</option>
              <option value="thick">Thick</option>
            </select>
          </div>
        </section>
      </main>

      <footer>
        © <time datetime="2026" id="year">2026</time> Made width <span>♥</span> by
        <em><abbr title="Web Developer Frontend Master">SheriffKule</abbr></em> from XXIII century
      </footer>
    </div>

    <audio src="" id="bell-sound"></audio>
    <audio src="" id="beep-sound"></audio>
    <audio src="" id="horn-sound"></audio>
    <audio src="" id="chime-sound"></audio>
    <audio src="" id="tick-sound"></audio>

    <script src="/widgets_script/workoutTimer.js"></script>
  </body>
</html>
