<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Age Calculator</title>
    <link rel="stylesheet" href="/widgets_style/advancedAgeCalculator.css" />
  </head>
  <body>
    <button class="theme-toggle" id="themeToggle">🌓</button>

    <div class="container">
      <header class="header">
        <h1>Advanced Age Calculator</h1>
        <p>Discover your exact age and upcoming life milestones.</p>
      </header>

      <div class="content">
        <section class="input-section">
          <article class="input-group">
            <label for="day">Day</label>
            <select id="day">
              <option value="" disabled selected>Day</option>
            </select>
          </article>

          <article class="input-group">
            <label for="month">Month</label>
            <select id="month">
              <option value="" disabled selected>Month</option>
              <option value="1">January</option>
              <option value="2">February</option>
              <option value="3">March</option>
              <option value="4">April</option>
              <option value="5">May</option>
              <option value="6">June</option>
              <option value="7">July</option>
              <option value="8">August</option>
              <option value="9">September</option>
              <option value="10">October</option>
              <option value="11">November</option>
              <option value="12">December</option>
            </select>
          </article>

          <article class="input-group">
            <label for="year">Year</label>
            <input type="number" id="year" placeholder="Year" min="1900" max="2100" />
          </article>
        </section>

        <section class="action-buttons">
          <button class="btn-primary" id="calculateBtn">
            <svg
              class="icon"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            Calculate Age
          </button>
          <button class="btn secondary" id="resetBtn">
            <svg
              class="icon"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg> Reset
          </button>
        </section>
      </div>
    </div>

    <script src="/widgets_script/advancedAgeCalculator.js"></script>
  </body>
</html>
