<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Cakes Bakery</title>
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" />
    <link rel="stylesheet" href="/scripts/swiper-bundle.css" />
    <link rel="stylesheet" href="cakeWebsite.css" />
  </head>
  <body>
    <header class="header" id="header">
      <nav class="nav container">
        <a href="#" class="nav__logo">
          <img src="img/logo.svg" alt="Logo Delizia" />
          <span>Delizia</span>
        </a>

        <div class="nav__menu" id="nav-menu">
          <ul class="nav__list">
            <li><a href="#home" class="nav__link">Home</a></li>
            <li><a href="#about" class="nav__link">About Us</a></li>
            <li><a href="#product" class="nav__link">Products</a></li>
            <li><a href="#new" class="nav__link">New</a></li>
            <li><a href="#contact" class="nav__link">Contact</a></li>
          </ul>

          <button class="nav__close" id="nav-close" aria-label="Close menu">
            <i class="ri-close-large-line"></i>
          </button>

          <img src="img/leaf-3.png" alt="" class="nav__img" />
        </div>

        <button class="nav__toggle" id="nav-toggle" aria-label="Toggle menu" title="Menu Toggle">
          <i class="ri-apps-2-line"></i>
        </button>
      </nav>
    </header>

    <main class="main">
      <section class="home section" id="home">
        <div class="home__container container grid">
          <div class="home__data">
            <h1 class="home__title">Best Custom <span>Cakes Bakery</span></h1>

            <p class="home__description">
              We create handcrafted cakes made with love, premium ingredients, and a touch of magic. Because
              life's sweetest moments deserve to be celebrated in a special way.
            </p>

            <a href="#new" class="button">Explore Our Cakes</a>

            <img src="img/home-slice-cake-1.png" alt="Slice cake" class="home__slice-1" loading="lazy" />
            <img src="img/home-slice-cake-2.png" alt="Slice cake" class="home__slice-2" loading="lazy" />
            <img src="img/home-balloons.png" alt="balloons" class="home__balloons" loading="lazy" />
            <img src="img/sticker-4.svg" alt="sticker" class="home__sticker-1" loading="lazy" />
            <img src="img/sticker-3.svg" alt="sticker" class="home__sticker-2" loading="lazy" />
          </div>

          <div class="home__images">
            <img src="img/home-blob.svg" alt="Blob" class="home__blob" loading="lazy" />
            <img src="img/home-base.png" alt="Base" class="home__base" loading="lazy" />
            <img src="img/leaf-1.png" alt="Leaf" class="home__leaf-1" loading="lazy" />
            <img src="img/leaf-3.png" alt="Leaf" class="home__leaf-2" loading="lazy" />
            <img src="img/sticker-1.svg" alt="Sticker" class="home__sticker-3" loading="lazy" />
            <img src="img/sticker-2.svg" alt="Sticker" class="home__sticker-4" loading="lazy" />

            <div class="home__swiper swiper">
              <div class="swiper-wrapper">
                <article class="home__article swiper-slide">
                  <img
                    src="img/home-cake-1.png"
                    alt="Delicious decorated cake"
                    class="home__cake"
                    loading="lazy" />
                </article>
                <article class="home__article swiper-slide">
                  <img
                    src="img/home-cake-2.png"
                    alt="Delicious decorated cake"
                    class="home__cake"
                    loading="lazy" />
                </article>
                <article class="home__article swiper-slide">
                  <img
                    src="img/home-cake-3.png"
                    alt="Delicious decorated cake"
                    class="home__cake"
                    loading="lazy" />
                </article>
                <article class="home__article swiper-slide">
                  <img
                    src="img/home-cake-4.png"
                    alt="Delicious decorated cake"
                    class="home__cake"
                    loading="lazy" />
                </article>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="/scripts/scrollreveal.min.js"></script>
    <script src="/scripts/swiper-bundle.min.js"></script>
    <script src="cakeWebsite.js"></script>
  </body>
</html>
