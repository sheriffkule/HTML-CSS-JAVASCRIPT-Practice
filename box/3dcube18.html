<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Isometric Data Center</title>
    <link rel="stylesheet" href="/box_style/3dcube18.css" />
  </head>
  <body>
    <div class="scene">
      <div class="datacenter">
        <div class="grid-floor"></div>

        <div class="server s1">
          <div class="face bottom"></div>
          <div class="face front">
            <div class="rack">
              <div class="light cyan blink-1"></div>
              <div class="light purple blink-3"></div>
            </div>
            <div class="rack">
              <div class="light blue blink-2"></div>
              <div class="light cyan blink-1"></div>
            </div>
            <div class="rack">
              <div class="light purple blink-2"></div>
              <div class="light blue blink-1"></div>
            </div>
          </div>
          <div class="face back"></div>
          <div class="face left"></div>
          <div class="face right"></div>
          <div class="face top"></div>
        </div>

        <div class="server s2">
          <div class="face bottom"></div>
          <div class="face front">
            <div class="rack">
              <div class="light purple blink-2"></div>
            </div>
            <div class="rack">
              <div class="light cyan blink-3"></div>
              <div class="light blue blink-1"></div>
            </div>
            <div class="rack">
              <div class="light blue blink-2"></div>
            </div>
            <div class="rack">
              <div class="light cyan blink-1"></div>
            </div>
          </div>
          <div class="face back"></div>
          <div class="face left"></div>
          <div class="face right"></div>
          <div class="face top"></div>
        </div>

        <div class="server s3">
          <div class="face bottom"></div>
          <div class="face front">
            <div class="rack">
              <div class="light blue blink-1"></div>
            </div>
            <div class="rack">
              <div class="light purple blink-2"></div>
              <div class="light cyan blink-1"></div>
            </div>
            <div class="rack">
              <div class="light cyan blink-3"></div>
            </div>
          </div>
          <div class="face back"></div>
          <div class="face left"></div>
          <div class="face right"></div>
          <div class="face top"></div>
        </div>

        <div class="server s4">
          <div class="face bottom"></div>
          <div class="face front">
            <div class="rack">
              <div class="light cyan blink-2"></div>
              <div class="light purple blink-1"></div>
            </div>
            <div class="rack">
              <div class="light blue blink-3"></div>
            </div>
            <div class="rack">
              <div class="light purple blink-2"></div>
            </div>
            <div class="rack">
              <div class="light cyan blink-1"></div>
              <div class="light blue blink-2"></div>
            </div>
          </div>
          <div class="face back"></div>
          <div class="face left"></div>
          <div class="face right"></div>
          <div class="face top"></div>
        </div>
      </div>
    </div>
  </body>
</html>
