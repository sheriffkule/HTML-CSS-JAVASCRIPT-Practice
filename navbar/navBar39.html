<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neumorphism Sidebar</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="/navbar_style/navBar39.css" />
  </head>
  <body>
    <header class="header">
      <button class="header__toggle" id="header-toggle">
        <i class="ri-menu-line"></i>
      </button>
    </header>

    <aside class="sidebar" id="sidebar">
      <button class="sidebar__close" id="sidebar-close">
        <i class="ri-close-large-line"></i>
      </button>

      <button class="sidebar__toggle" id="sidebar-toggle">
        <i class="ri-side-bar-line"></i>
      </button>

      <div class="sidebar__data">
        <img src="/images/clint.jpeg" alt="" class="sidebar__perfil" />

        <h3 class="sidebar__name">Good Blondie</h3>
        <p class="sidebar__status">Administrator</p>
      </div>

      <nav class="sidebar__menu">
        <div class="sidebar__content">
          <a href="#" class="sidebar__link">
            <div class="sidebar__box">
              <div class="sidebar__glow"></div>
            </div>

            <div class="sidebar__group">
              <i class="ri-home-2-line sidebar__icon"></i>
              <span class="sidebar__label">Home</span>
            </div>
          </a>

          <a href="#" class="sidebar__link">
            <div class="sidebar__box">
              <div class="sidebar__glow"></div>
            </div>

            <div class="sidebar__group">
              <i class="ri-user-line sidebar__icon"></i>
              <span class="sidebar__label">Users</span>
            </div>
          </a>

          <a href="#" class="sidebar__link">
            <div class="sidebar__box">
              <div class="sidebar__glow"></div>
            </div>

            <div class="sidebar__group">
              <i class="ri-box-3-line sidebar__icon"></i>
              <span class="sidebar__label">Templates</span>
            </div>
          </a>

          <a href="#" class="sidebar__link">
            <div class="sidebar__box">
              <div class="sidebar__glow"></div>
            </div>

            <div class="sidebar__group">
              <i class="ri-file-list-2-line sidebar__icon"></i>
              <span class="sidebar__label">Invoices</span>
            </div>
          </a>

          <a href="#" class="sidebar__link">
            <div class="sidebar__box">
              <div class="sidebar__glow"></div>
            </div>

            <div class="sidebar__group">
              <i class="ri-folder-5-line sidebar__icon"></i>
              <span class="sidebar__label">Projects</span>
            </div>
          </a>

          <a href="#" class="sidebar__link">
            <div class="sidebar__box">
              <div class="sidebar__glow"></div>
            </div>

            <div class="sidebar__group">
              <i class="ri-notification-3-line sidebar__icon"></i>
              <span class="sidebar__label">Notifications</span>
            </div>
          </a>

          <a href="#" class="sidebar__link">
            <div class="sidebar__box">
              <div class="sidebar__glow"></div>
            </div>

            <div class="sidebar__group">
              <i class="ri-bank-card-line sidebar__icon"></i>
              <span class="sidebar__label">Billing</span>
            </div>
          </a>

          <a href="#" class="sidebar__link">
            <div class="sidebar__box">
              <div class="sidebar__glow"></div>
            </div>

            <div class="sidebar__group">
              <i class="ri-settings-line sidebar__icon"></i>
              <span class="sidebar__label">Settings</span>
            </div>
          </a>
        </div>

        <a href="#" class="sidebar__link sidebar__link-large">
          <div class="sidebar__box">
            <div class="sidebar__glow"></div>
          </div>

          <div class="sidebar__group">
            <i class="ri-logout-box-line sidebar__icon"></i>
            <span class="sidebar__label">Log Out</span>
          </div>
        </a>
      </nav>
    </aside>

    <script src="/navBar_script/navBar39.js"></script>
  </body>
</html>
