<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scrollable Date Time Picker</title>
    <link rel="stylesheet" href="/clickEffect_style/clickEffect69.css" />
  </head>
  <body>
    <div class="container">
      <h1>Scrollable Date Time Picker</h1>
      <div class="data-time">
        <div class="date">
          <h3>Date</h3>
          <div class="picker">
            <div class="scrollable" id="month">
              <div class="scrollable-content"></div>
            </div>
            <div class="scrollable" id="day">
              <div class="scrollable-content"></div>
            </div>
            <div class="scrollable" id="year">
              <div class="scrollable-content"></div>
            </div>
          </div>
        </div>
        <div class="time">
          <h3>Time</h3>
          <div class="picker">
            <div class="scrollable" id="hour">
              <div class="scrollable-content"></div>
            </div>
            <div class="scrollable" id="minute">
              <div class="scrollable-content"></div>
            </div>
            <div class="scrollable" id="ampm">
              <div class="scrollable-content"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="selected-display">
        <p>Selected Date & Time: <span id="selectedDateTime">---</span></p>
      </div>
    </div>
    <script src="/clickEffect_script/clickEffect69.js"></script>
  </body>
</html>
