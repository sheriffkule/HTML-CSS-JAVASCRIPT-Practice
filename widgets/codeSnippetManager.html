<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Snippet Manger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="stylesheet" href="/widgets_style/codeSnippetManager.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo">
          <i class="fas fa-code"></i>
          <h1>Code Snippet Manager</h1>
        </div>
        <div class="app-controls">
          <button class="btn btn-secondary" id="importBtn"><i class="fas fa-file-import"></i> Import</button>
          <button class="btn btn-secondary" id="exportBtn"><i class="fas fa-file-export"></i> Export</button>
          <button class="btn btn-primary" id="addSnippetBtn">
            <i class="fas fa-file-plus"></i> Add Snippet
          </button>
        </div>
      </header>
    </div>
  </body>
</html>
